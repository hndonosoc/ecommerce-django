{% extends "base.html" %}
{% block title %}Eliminar Producto{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card delete-card">
      <div class="card-body text-center p-5">

        <h3 class="delete-title mb-4">
          Confirmar Eliminación
        </h3>

        <p class="fs-5 mb-2">
          ¿Deseas eliminar el producto:
        </p>

        <h4 class="fw-bold modern-font mb-3">
          {{ producto.nombre }}
        </h4>

        <p class="warning-text mb-4">
          Esta acción no se puede deshacer.
        </p>

        <form method="post">
          {% csrf_token %}
          <a href="{% url 'products:list' %}" 
             class="btn btn-outline-light me-3 px-4">
            Cancelar
          </a>

          <button type="submit" 
                  class="btn btn-primary px-4">
            Sí, eliminar
          </button>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
